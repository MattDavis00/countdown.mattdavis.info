<!-- Clock Text -->
<div class="column">
    <div class="countdown-title">
        <h2 name="timeRemaining">{{name}}</h2>
        <div>in</div>
    </div>
    <h1 name="timeRemaining" class="clock">{{timeRemaining}}</h1>
</div>

<!-- Rounded switch -->
<label class="switch no-select">
    <input id="theme" name="theme" (change)="themeChange()" [(ngModel)]="theme" type="checkbox">
    <span class="slider round"></span>
</label>
