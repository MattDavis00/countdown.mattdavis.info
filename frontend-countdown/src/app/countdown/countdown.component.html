<!-- Clock Text -->
<div class="column dark">
    <h1 name="timeRemaining" class="clock dark">{{timeRemaining}}</h1>
</div>

<!-- Rounded switch -->
<label class="switch no-select">
    <input id="theme" name="theme" (change)="themeChange()" [(ngModel)]="theme" type="checkbox">
    <span class="slider round"></span>
</label>
